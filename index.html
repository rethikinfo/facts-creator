<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Smart Infinite Facts Generator</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:900px;
}

.title{
  text-align:center;
  margin-bottom:15px;
  font-size:3rem;
}

.subtitle{
  text-align:center;
  color:#94a3b8;
  margin-bottom:30px;
}

.categories{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-bottom:25px;
}

.categories button{
  background:#1e293b;
  border:none;
  color:white;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

.categories button:hover{
  background:#2563eb;
}

.fact-box{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:24px;
  padding:40px;
  margin-bottom:25px;
  min-height:220px;
}

#fact{
  font-size:1.6rem;
  line-height:1.7;
  margin-bottom:25px;
}

#details{
  color:#cbd5e1;
  line-height:1.7;
  font-size:1rem;
}

.buttons{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
}

.buttons button{
  border:none;
  cursor:pointer;
  transition:0.3s;
}

.generate-btn{
  background:#2563eb;
  color:white;
  padding:15px 30px;
  border-radius:16px;
  font-size:1rem;
}

.generate-btn:hover{
  background:#1d4ed8;
}

.small-btn{
  background:#1e293b;
  color:white;
  width:55px;
  height:55px;
  border-radius:50%;
  font-size:1rem;
}

.small-btn:hover{
  background:#334155;
}

.stats{
  margin-top:25px;
  text-align:center;
  color:#94a3b8;
  line-height:2;
}

@media(max-width:768px){

  .title{
    font-size:2.1rem;
  }

  #fact{
    font-size:1.2rem;
  }

  .fact-box{
    padding:25px;
  }

}

</style>
</head>
<body>

<div class="container">

<h1 class="title">Smart Infinite Facts Generator</h1>

<p class="subtitle">
Generate new facts without repetition
</p>

<div class="categories">

<button onclick="setCategory('science')">
Science
</button>

<button onclick="setCategory('animals')">
Animals
</button>

<button onclick="setCategory('space')">
Space
</button>

<button onclick="setCategory('history')">
History
</button>

<button onclick="setCategory('technology')">
Technology
</button>

</div>

<div class="fact-box">

<div id="fact">
Click Generate Fact
</div>

<div id="details">
Detailed explanation will appear here.
</div>

</div>

<div class="buttons">

<button class="generate-btn" onclick="generateFact()">
Generate Fact
</button>

<button class="small-btn" onclick="copyFact()">
📋
</button>

<button class="small-btn" onclick="speakFact()">
🔊
</button>

<button class="small-btn" onclick="resetCache()">
♻️
</button>

</div>

<div class="stats">

<div>
Viewed Facts:
<span id="viewedCount">0</span>
</div>

<div>
Remaining Facts:
<span id="remainingCount">0</span>
</div>

</div>

</div>

<script>

let currentCategory = "science";

function setCategory(category){
  currentCategory = category;
  updateStats();
}

const facts = {
  science: [],
  animals: [],
  space: [],
  history: [],
  technology: []
};

const scienceBase = [
  "Lightning is hotter than the Sun.",
  "Bananas are slightly radioactive.",
  "Water can boil and freeze simultaneously.",
  "The human brain generates electricity.",
  "Sound travels faster underwater."
];

const animalBase = [
  "Octopuses have three hearts.",
  "Sharks existed before trees.",
  "Butterflies taste with their feet.",
  "Sea otters hold hands while sleeping.",
  "Koalas sleep up to 22 hours daily."
];

const spaceBase = [
  "One day on Venus is longer than a year.",
  "Space is completely silent.",
  "Saturn could float in water.",
  "Mars has the tallest volcano.",
  "Footprints on the Moon last millions of years."
];

const historyBase = [
  "Oxford University is older than the Aztec Empire.",
  "The shortest war lasted 38 minutes.",
  "Napoleon was attacked by rabbits.",
  "Ancient Romans used urine as toothpaste.",
  "The Eiffel Tower grows in summer."
];

const technologyBase = [
  "The first computer bug was a real bug.",
  "The first website still exists.",
  "Email existed before the internet.",
  "The internet travels through underwater cables.",
  "Smartphones are stronger than old supercomputers."
];

function generateDetailedFacts(category, baseFacts) {

  for (let i = 1; i <= 20; i++) {

    baseFacts.forEach((fact) => {

      facts[category].push({

        short: `${fact} (#${i})`,

        detail:
          `${fact} This detailed explanation expands on the scientific and historical importance of the fact. Fact variation number ${i} provides a unique version that helps prevent repetition and keeps the generator fresh for users.`

      });

    });

  }

}

generateDetailedFacts("science", scienceBase);
generateDetailedFacts("animals", animalBase);
generateDetailedFacts("space", spaceBase);
generateDetailedFacts("history", historyBase);
generateDetailedFacts("technology", technologyBase);

console.log(facts);

let usedFacts =
JSON.parse(localStorage.getItem("usedFacts")) || [];

function generateFact(){

const availableFacts =
facts[currentCategory].filter(
fact => !usedFacts.includes(fact.short)
);

if(availableFacts.length === 0){

document.getElementById("fact").innerText =
"No new facts remaining in this category.";

document.getElementById("details").innerText =
"Reset cache to see facts again.";

return;

}

const randomFact =
availableFacts[
Math.floor(Math.random() * availableFacts.length)
];

usedFacts.push(randomFact.short);

localStorage.setItem(
"usedFacts",
JSON.stringify(usedFacts)
);

document.getElementById("fact").innerText =
randomFact.short;

document.getElementById("details").innerText =
randomFact.detail;

updateStats();

}

function updateStats(){

const viewed = usedFacts.length;

const total =
facts[currentCategory].length;

const remaining =
facts[currentCategory].filter(
fact => !usedFacts.includes(fact.short)
).length;

document.getElementById("viewedCount").innerText =
viewed;

document.getElementById("remainingCount").innerText =
remaining;

}

function copyFact(){

const text =
document.getElementById("fact").innerText
+
" "
+
document.getElementById("details").innerText;

navigator.clipboard.writeText(text);

alert("Fact copied!");

}

function speakFact(){

const text =
document.getElementById("fact").innerText
+
". "
+
document.getElementById("details").innerText;

const speech =
new SpeechSynthesisUtterance(text);

speechSynthesis.speak(speech);

}

function resetCache(){

const password =
prompt("Enter reset password");

if(password === "1234"){

localStorage.clear();

usedFacts = [];

alert("Cache reset successful");

updateStats();

}else{

alert("Wrong password");

}

}

updateStats();

</script>

</body>
</html>
