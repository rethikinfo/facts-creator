const database = firebase.database();
const usedFactsRef = database.ref("globalUsedFacts");

let usedFacts = [];

// Listen for global data updates across all users in real-time
usedFactsRef.on("value", (snapshot) => {
    const data = snapshot.val();
    usedFacts = data ? Object.values(data) : [];
    
    // Set landing text once initialized
    if (document.getElementById("fact").innerText === "Connecting to global sync server...") {
        document.getElementById("fact").innerText = "Click the button below to display an amazing fact!";
    }
});

    if (availableFacts.length === 0) {

        return;
    }

    const randomFact = availableFacts[

    // Push selection to cloud database (instantly syncs with everyone else)
    usedFactsRef.push(randomFact);
